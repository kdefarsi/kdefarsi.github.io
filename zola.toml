# The URL the site will be built for
base_url = "https://kdefarsi.github.io"

# Whether to automatically compile all Sass files in the sass directory
theme = "xuan"
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

title = "جامعه کی‌دی‌ای فارسی"
description = "جامعه کاربران و توسعه‌دهندگان کی‌دی‌ای فارسی زبان"
default_language = "fa"

generate_feeds = true
feed_filenames = ["atom.xml"]

[markdown]

[markdown.highlighting]
theme = "catppuccin-mocha"

[[taxonomies]]
name = "tags"
feed = true

[extra]
# Put all your custom variables here

accent_color = "#3daee9"
accent_color_dark = "#93cee9"

default_theme = "dark"

search = true
scripts = ["jalali-dates.js"]

source_url = "https://github.com/kdefarsi/kdefarsi.github.io"

[extra.nav]
auto_hide = false
show_theme_switcher = true
show_feed = true
show_repo = true

[[extra.nav.links]]
name = "Blog"
url = "blog"

[[extra.nav.links]]
name = "Archive"
url = "archive"

[[extra.nav.links]]
name = "Tags"
url = "tags"

[[extra.nav.links]]
name = "About"
url = "about"

[[extra.nav.links]]
name = "Links"
url = "links"

